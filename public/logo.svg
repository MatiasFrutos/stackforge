<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>StackForge Logo</title>
  <desc>Logo oficial de StackForge por ZERNYX Tech Studio</desc>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.95"/>
      <stop offset="42%" stop-color="#7C3AED" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#24104F" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="cardGradient" x1="92" y1="92" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="45%" stop-color="#E9D5FF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.16"/>
    </linearGradient>

    <linearGradient id="stackGradient" x1="132" y1="160" x2="390" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="48%" stop-color="#F5D0FE"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <linearGradient id="boltGradient" x1="226" y1="100" x2="306" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="36%" stop-color="#FBBF24"/>
      <stop offset="72%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>

    <linearGradient id="lineGradient" x1="116" y1="128" x2="396" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E9D5FF" stop-opacity="0.35"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12002D" flood-opacity="0.32"/>
    </filter>

    <filter id="boltGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FBBF24" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#F97316" flood-opacity="0.45"/>
    </filter>

    <filter id="glassStroke" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="118" fill="url(#bgGlow)"/>

  <!-- Decorative orbs -->
  <circle cx="112" cy="104" r="72" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="416" cy="394" r="96" fill="#C084FC" opacity="0.16"/>
  <circle cx="398" cy="100" r="34" fill="#FDE68A" opacity="0.16"/>

  <!-- Outer glass card -->
  <rect x="70" y="70" width="372" height="372" rx="92" fill="url(#cardGradient)" stroke="url(#lineGradient)" stroke-width="3" filter="url(#softShadow)"/>

  <!-- Code brackets -->
  <path d="M152 190L116 226L152 262" stroke="#F5F3FF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  <path d="M360 190L396 226L360 262" stroke="#F5F3FF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>

  <!-- Stack layers -->
  <g filter="url(#glassStroke)">
    <path d="M156 330L256 278L356 330L256 382L156 330Z" fill="url(#stackGradient)" opacity="0.92"/>
    <path d="M156 286L256 234L356 286L256 338L156 286Z" fill="url(#stackGradient)" opacity="0.76"/>
    <path d="M156 242L256 190L356 242L256 294L156 242Z" fill="url(#stackGradient)" opacity="0.62"/>

    <path d="M156 330L256 382L356 330" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
    <path d="M156 286L256 338L356 286" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
    <path d="M156 242L256 294L356 242" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.42"/>
  </g>

  <!-- Lightning bolt / forge spark -->
  <path
    d="M282 104L204 268H256L230 408L318 224H264L282 104Z"
    fill="url(#boltGradient)"
    stroke="#FFF7ED"
    stroke-width="7"
    stroke-linejoin="round"
    filter="url(#boltGlow)"
  />

  <!-- Tiny sparks -->
  <path d="M138 128L148 104L158 128L182 138L158 148L148 172L138 148L114 138L138 128Z" fill="#FDE68A" opacity="0.95"/>
  <path d="M382 314L390 296L398 314L416 322L398 330L390 348L382 330L364 322L382 314Z" fill="#FDE68A" opacity="0.82"/>
  <circle cx="108" cy="330" r="7" fill="#FDE68A" opacity="0.85"/>
  <circle cx="404" cy="170" r="6" fill="#FFFFFF" opacity="0.78"/>

  <!-- Bottom initials -->
  <text
    x="256"
    y="438"
    text-anchor="middle"
    font-family="Inter, Segoe UI, Arial, sans-serif"
    font-size="34"
    font-weight="900"
    letter-spacing="5"
    fill="#F5F3FF"
    opacity="0.92"
  >SF</text>
</svg>
